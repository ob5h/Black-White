<!DOCTYPE html>
<html>
<head>
  <title>Black White Toggle</title>
  <style>
    body {
      margin: 0;
      background: rgb(0,0,0); /* start black */
      cursor: none; /* hide the cursor */
      height: 100vh;
    }
  </style>
</head>
<body>

<script>
  let isBlack = true;

document.addEventListener("keydown", (e) => {
  const key = e.key.toLowerCase();

  // Exclude only specific keys
  if (
    key === "f11" ||
    key === "tab" ||
    key === "alt" ||
    key === "t" ||
    key === "control"
  ) {
    return;
  }

  // Toggle background instantly
  isBlack = !isBlack;
  document.body.style.background = isBlack
    ? "rgb(0,0,0)"
    : "rgb(255,255,255)";
});
</script>

</body>
</html>
