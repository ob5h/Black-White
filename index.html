<!DOCTYPE html>
<html>
<head>
  <title>Black White Toggle</title>
  <style>
    body {
      margin: 0;
      background: rgb(0,0,0); /* start black */
      cursor: none; /* hide the cursor */
      height: 100vh;
    }
  </style>
</head>
<body>

<script>
  let isBlack = true;

  document.addEventListener("keydown", (e) => {
    // Exclude these keys: F11, Ctrl, Tab, T
    if (
      e.key === "F11" ||
      e.key === "Tab" ||
      e.key.toLowerCase() === "t" ||
      e.key === "Escape"
      e.ctrlKey
    ) {
      return; // do nothing for excluded keys
    }

    // Toggle background instantly
    isBlack = !isBlack;
    document.body.style.background = isBlack
      ? "rgb(0,0,0)"
      : "rgb(255,255,255)";
  });
</script>

</body>
</html>
