<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Space Toggle</title>
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: rgb(0, 0, 0);
      cursor: none;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <script>
    let isBlack = true;

    document.addEventListener("keydown", (e) => {
      if (e.code === "Space") {
        e.preventDefault();
        isBlack = !isBlack;
        document.body.style.backgroundColor = isBlack
          ? "rgb(0, 0, 0)"
          : "rgb(255, 255, 255)";
      }
    });
  </script>
</body>
</html>
