<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toggle Background</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: rgb(0, 0, 0);
            cursor: none; /* Hide the cursor */
        }
    </style>
</head>
<body>
    <script>
        let isBlack = true;

        document.body.addEventListener('keydown', (event) => {
            if (event.code === 'Space') {
                isBlack = !isBlack;
                document.body.style.backgroundColor = isBlack ? 'rgb(0,0,0)' : 'rgb(255,255,255)';
            }
        });

        // Make sure the body is focused to catch key presses
        window.onload = () => {
            document.body.tabIndex = 0;
            document.body.focus();
        };
    </script>
</body>
</html>
