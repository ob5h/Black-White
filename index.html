<!DOCTYPE html>
<html>
<head>
  <title>Black White Toggle</title>
  <style>
    body {
      margin: 0;
      background: rgb(0,0,0);
      cursor: none;
      height: 100vh;
    }
  </style>
</head>
<body tabindex="0">

<script>
  let isBlack = true;

  // Ensure body has focus
  document.body.focus();

  document.addEventListener("keydown", (e) => {
    const key = e.key.toLowerCase();

    if (
      key === "f11" ||
      key === "tab" ||
      key === "alt" ||
      key === "t" ||
      key === "control"
    ) {
      return;
    }

    isBlack = !isBlack;
    document.body.style.background = isBlack
      ? "rgb(0,0,0)"
      : "rgb(255,255,255)";
  });
</script>

</body>
</html>
