<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Simple Toggle Page</title>
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: rgb(0, 0, 0);
      cursor: none;
    }
  </style>
</head>
<body>
  <script>
    (function () {
      let isBlack = true;

      function setBackground() {
        document.body.style.backgroundColor = isBlack
          ? "rgb(0, 0, 0)"
          : "rgb(255, 255, 255)";
      }

      document.addEventListener("keydown", function (event) {
        const key = event.key.toLowerCase();
        const code = event.code;

        // Ignore these keys
        if (
          key === "alt" ||
          key === "tab" ||
          key === "control" ||
          key === "t" ||
          code === "F11" ||
          code === "MetaLeft" ||
          code === "MetaRight" ||
          key === "meta"
        ) {
          return;
        }

        isBlack = !isBlack;
        setBackground();
      });

      setBackground();
    })();
  </script>
</body>
</html>
